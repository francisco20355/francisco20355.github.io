<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Elite | Admin & Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6;
            --success: #10b981; --text: #f1f5f9; --dim: #94a3b8; --danger: #ef4444; --warning: #f59e0b;
            --admin-msg: #4f46e5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra de Anuncio Global (Visible para todos) */
        #globalAlert { display:none; background: #dc2626; color: white; padding: 12px; text-align: center; font-weight: bold; width: 100%; position: sticky; top: 0; z-index: 999; border-bottom: 2px solid #7f1d1d; }

        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        header { text-align: center; padding: 20px 0; }
        
        /* Contador de Visitas */
        .stats-bar { font-size: 0.75rem; color: var(--dim); margin-top: 5px; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 20px; display: inline-block; }

        .live-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .post-box { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 80px; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; }

        /* Confesiones */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .author { font-size: 0.8rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        
        /* Etiquetas */
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; color: white; font-weight: bold; text-transform: uppercase; }
        .bg-custom { background: #8b5cf6; } /* Morado */
        .bg-top { background: #ec4899; } /* Rosa */

        /* Respuestas */
        .replies { margin-top: 12px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 10px; }
        .reply-txt { font-size: 0.85rem; margin-bottom: 5px; padding: 6px; border-radius: 8px; color: var(--dim); position: relative; }
        .reply-admin { background: var(--admin-msg); color: white !important; font-weight: 500; border-left: 3px solid white; }
        .reply-in { width: 100%; background: transparent; border: none; color: white; border-bottom: 1px solid #475569; outline: none; font-size: 0.85rem; margin-top: 8px; }

        /* Panel de Control Admin en la Card */
        .admin-controls { display: none; background: rgba(15, 23, 42, 0.5); margin-top: 15px; padding: 10px; border-radius: 12px; border: 1px dashed var(--accent); gap: 8px; flex-wrap: wrap; }
        .btn-adm { font-size: 10px; padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.96); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-card { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #475569; box-sizing: border-box; }

        #adminTrigger { position:fixed; bottom:20px; left:20px; width:45px; height:45px; background: #1e293b; border: 1px solid var(--accent); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor:pointer; z-index: 10001; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<!-- Barra de Anuncio (Se controla desde DB) -->
<div id="globalAlert">
    <span id="alertText">📢 CARGANDO ANUNCIO...</span>
</div>

<div class="container">
    <header>
        <h1 style="margin-bottom:0">🤫 Confesionario</h1>
        <div class="stats-bar">
            <span class="live-dot"></span> <span id="visitCount">0</span> visitas totales
        </div>
    </header>

    <div class="post-box">
        <textarea id="mainIn" placeholder="¿Qué está pasando? Suéltalo..."></textarea>
        <button class="btn-post" onclick="abrirModal()">Publicar</button>
    </div>

    <div id="muro"></div>
</div>

<!-- Modal Identidad -->
<div id="modalVerifica" class="modal-overlay">
    <div class="modal-card">
        <h3 style="margin-top:0">🛡️ Verificación Real</h3>
        <p style="font-size:0.8rem; color:var(--dim)">Tu nombre real es privado y solo el admin puede verlo en caso de problemas.</p>
        <input type="text" id="nombreReal" placeholder="Escribe tu nombre completo">
        <button class="btn-post" style="width:100%; float:none;" onclick="enviarFinal()">Confirmar y Publicar</button>
    </div>
</div>

<!-- Botón Flotante Admin -->
<div id="adminTrigger" onclick="checkAdmin()">⚙️</div>

<script>
    // --- CONFIGURACIÓN ---
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;

    // --- CARGAR DATOS (FUNCIÓN MAESTRA) ---
    async function cargarTodo() {
        // 1. Obtener Anuncio y Visitas
        const { data: config } = await client.from('config').select('*');
        if(config) {
            const anuncio = config.find(c => c.clave === 'anuncio')?.valor;
            const visitas = config.find(c => c.clave === 'visitas')?.valor;
            
            if(anuncio && anuncio.trim() !== "") {
                document.getElementById('alertText').innerText = "📢 " + anuncio;
                document.getElementById('globalAlert').style.display = 'block';
            } else {
                document.getElementById('globalAlert').style.display = 'none';
            }
            document.getElementById('visitCount').innerText = visitas || 0;
        }

        // 2. Obtener Confesiones
        const { data: posts } = await client.from('confesiones').select('id, mensaje, autor, likes, created_at, etiqueta_admin').order('created_at', { ascending: false });
        const { data: resps } = await client.from('respuestas').select('id, mensaje, confesion_id, es_admin').order('created_at', { ascending: true });
        
        const muro = document.getElementById('muro');
        const misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');

        muro.innerHTML = posts.map(p => {
            const yaVoto = misLikes.includes(p.id);
            const filtradas = resps ? resps.filter(r => r.confesion_id === p.id) : [];
            
            let badgeHtml = p.etiqueta_admin ? `<span class="badge bg-custom">💎 ${p.etiqueta_admin}</span>` : (p.likes >= 5 ? `<span class="badge bg-top">🔥 TOP</span>` : '');

            return `
                <div class="card">
                    <div class="author">👤 ${p.autor} ${badgeHtml}</div>
                    <div style="color: white; font-size: 1.1rem; line-height:1.4">${p.mensaje}</div>
                    
                    <div class="actions" style="margin-top:10px">
                        <button class="btn-adm" onclick="darLike(${p.id})" ${yaVoto ? 'disabled' : ''} style="background:none; border:1px solid #334155; color:${yaVoto ? '#10b981':'white'}">
                            ${yaVoto ? '✅' : '❤️'} ${p.likes || 0}
                        </button>
                    </div>

                    <!-- Panel Admin oculto por defecto -->
                    <div class="admin-controls" style="display:${isAdmin ? 'flex' : 'none'}">
                        <button class="btn-adm" style="background:var(--accent)" onclick="editarEtiqueta(${p.id})">🏷️ Etiqueta</button>
                        <button class="btn-adm" style="background:var(--warning)" onclick="darLike(${p.id})">👍 +1 Like</button>
                        <button class="btn-adm" style="background:var(--danger)" onclick="borrarPost(${p.id})">🗑️ Borrar Post</button>
                    </div>

                    <div class="replies">
                        ${filtradas.map(r => `
                            <div class="reply-txt ${r.es_admin ? 'reply-admin' : ''}">
                                ${r.es_admin ? '🛡️ <b>ADMIN:</b> ' : '↳ '} ${r.mensaje}
                                ${isAdmin ? `<span onclick="borrarResp(${r.id})" style="color:red; cursor:pointer; margin-left:10px">✕</span>` : ''}
                            </div>`).join('')}
                        <input type="text" class="reply-in" placeholder="${isAdmin ? 'Responder como Admin...' : 'Comentar...'}" onkeypress="responder(${p.id}, event)">
                    </div>
                </div>`;
        }).join('');
    }

    // --- FUNCIONES ADMIN ---
    async function checkAdmin() {
        const pw = prompt("Clave Maestra:");
        if(!pw) return;
        const { data: ok } = await client.rpc('verificar_admin', { pass_ingresada: pw });
        if(ok) {
            isAdmin = true;
            const op = prompt("1: Panel / 2: Borrar Todo / 3: Cambiar Anuncio Global");
            if(op == "1") { cargarTodo(); alert("Modo Admin Activado"); }
            else if(op == "2") { if(confirm("¿Borrar todo?")) await client.from('confesiones').delete().neq('id', 0); location.reload(); }
            else if(op == "3") { 
                const msg = prompt("Escribe el mensaje del anuncio (déjalo vacío para quitarlo):");
                await client.from('config').update({ valor: msg }).eq('clave', 'anuncio');
                cargarTodo();
            }
        } else alert("Clave incorrecta");
    }

    async function editarEtiqueta(id) {
        const n = prompt("Nombre de la etiqueta:");
        if(n !== null) { await client.from('confesiones').update({ etiqueta_admin: n }).eq('id', id); cargarTodo(); }
    }

    async function borrarPost(id) { if(confirm("¿Borrar?")) { await client.from('confesiones').delete().eq('id', id); cargarTodo(); } }
    async function borrarResp(id) { await client.from('respuestas').delete().eq('id', id); cargarTodo(); }

    // --- FUNCIONES USUARIO ---
    async function incrementarVisitas() {
        if(!sessionStorage.getItem('v')) {
            await client.rpc('incrementar_visitas_config'); // Debes crear esta función en SQL de Supabase
            sessionStorage.setItem('v', '1');
        }
    }

    function abrirModal() { if(document.getElementById('mainIn').value.trim()) document.getElementById('modalVerifica').style.display = 'flex'; }
    
    async function enviarFinal() {
        const msg = document.getElementById('mainIn').value;
        const real = document.getElementById('nombreReal').value;
        if(real.length < 2) return alert("Nombre real necesario");
        const anon = ["Puma", "Lince", "Alcón", "Lobo"][Math.floor(Math.random()*4)] + " Anónimo";
        
        await client.from('confesiones').insert([{ mensaje: msg, autor: anon, nombre_real: real, likes: 0 }]);
        document.getElementById('mainIn').value = '';
        document.getElementById('modalVerifica').style.display = 'none';
        cargarTodo();
    }

    async function darLike(id) {
        await client.rpc('incrementar_like', { confesion_id: id });
        if(!isAdmin) {
            let misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');
            misLikes.push(id);
            localStorage.setItem('likes_v1', JSON.stringify(misLikes));
        }
        cargarTodo();
    }

    async function responder(id, e) {
        if(e.key === 'Enter' && e.target.value.trim()){
            await client.from('respuestas').insert([{ mensaje: e.target.value, confesion_id: id, es_admin: isAdmin }]);
            e.target.value = '';
            cargarTodo();
        }
    }

    // INICIO
    window.onload = async () => {
        await incrementarVisitas();
        cargarTodo();
    };

    // Escucha en tiempo real
    client.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, cargarTodo).subscribe();

</script>
</body>
</html>
