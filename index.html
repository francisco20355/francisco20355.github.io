<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Pro | Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --text: #f1f5f9;
            --dim: #94a3b8;
            --danger: #ef4444;
        }

        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .container { width: 100%; max-width: 500px; }

        header { text-align: center; padding: 20px 0; }
        .live-status { font-size: 0.75rem; color: var(--success); display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Caja de Publicación */
        .post-box { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 80px; font-family: inherit; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; }

        /* Modal de Seguridad */
        #modalSeguridad {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 9999;
            align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal-card { background: var(--card); padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #334155; }
        .modal-card input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; text-align: center; }

        /* Tarjetas */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; position: relative; }
        .author-info { font-size: 0.85rem; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .msg-text { font-size: 1.05rem; line-height: 1.5; margin-bottom: 15px; }

        /* Badges */
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 800; }
        .badge-epic { background: #ec4899; color: white; }
        .badge-trend { background: #fbbf24; color: #78350f; }

        /* Acciones */
        .actions { display: flex; gap: 8px; border-top: 1px solid #334155; padding-top: 12px; }
        .btn-action { background: #334155; border: none; color: white; padding: 6px 14px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .btn-whatsapp { background: #25d366; }

        /* Comentarios */
        .replies { margin-top: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; font-size: 0.9rem; }
        .reply-item { padding: 4px 0; border-bottom: 1px solid #334155; color: var(--dim); }
        .reply-input { width: 100%; background: transparent; border: none; color: white; margin-top: 10px; outline: none; border-bottom: 1px solid #475569; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="live-status"><div class="pulse"></div> <span id="online-count">1</span> personas conectadas</div>
        <h1 style="margin:0;">🤫 Confesionario Privado</h1>
    </header>

    <div class="post-box">
        <textarea id="txtMain" placeholder="Escribe tu secreto o un halago..."></textarea>
        <div style="overflow: auto;"><button class="btn-post" onclick="abrirModal()">Publicar</button></div>
    </div>

    <div id="muro"></div>
</div>

<div id="modalSeguridad">
    <div class="modal-card">
        <div style="font-size: 2rem;">🛡️</div>
        <h3>Validación de Seguridad</h3>
        <p style="font-size: 0.8rem; color: var(--dim);">Para mantener el respeto, ingresa tu nombre. <br><b>Este nombre NO se compartirá con nadie.</b></p>
        <input type="text" id="nombreRealInput" placeholder="Nombre completo">
        <button class="btn-post" style="float:none; width: 100%;" onclick="publicar()">Confirmar y Enviar</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const animales = ["Lobo", "Zorro", "Panda", "Tigre", "Águila", "León", "Dragón"];

    function abrirModal() {
        if(!document.getElementById('txtMain').value.trim()) return;
        document.getElementById('modalSeguridad').style.display = 'flex';
    }

    async function publicar() {
        const msg = document.getElementById('txtMain').value;
        const real = document.getElementById('nombreRealInput').value;
        if(real.length < 3) return alert("Pon tu nombre real");

        const anon = animales[Math.floor(Math.random() * animales.length)] + " Anónimo";
        
        await client.from('confesiones').insert([{ 
            mensaje: msg, autor: anon, nombre_real: real, likes: 0 
        }]);

        document.getElementById('txtMain').value = '';
        document.getElementById('nombreRealInput').value = '';
        document.getElementById('modalSeguridad').style.display = 'none';
        render();
    }

    async function darLike(id, l) {
        await client.from('confesiones').update({ likes: l + 1 }).eq('id', id);
        render();
    }

    async function comentar(id, e) {
        if(e.key === 'Enter' && e.target.value.trim()){
            await client.from('respuestas').insert([{ mensaje: e.target.value, confesion_id: id }]);
            e.target.value = '';
            render();
        }
    }

    function compartir(m) {
        window.open(`https://wa.me/?text=${encodeURIComponent("🤫 Confesión: " + m)}`, '_blank');
    }

    async function render() {
        const { data: confes } = await client.from('confesiones').select('*').order('created_at', { ascending: false });
        const { data: resps } = await client.from('respuestas').select('*').order('created_at', { ascending: true });

        document.getElementById('muro').innerHTML = confes.map(c => {
            const r_list = resps.filter(r => r.confesion_id === c.id);
            const badge = c.likes >= 10 ? '<span class="badge badge-epic">🔥 ÉPICO</span>' : (c.likes >= 3 ? '<span class="badge badge-trend">⭐ TENDENCIA</span>' : '');
            
            return `
                <div class="card">
                    <div class="author-info">👤 ${c.autor} ${badge}</div>
                    <div class="msg-text">${c.mensaje}</div>
                    <div class="actions">
                        <button class="btn-action" onclick="darLike(${c.id}, ${c.likes})">❤️ ${c.likes || 0}</button>
                        <button class="btn-action btn-whatsapp" onclick="compartir('${c.mensaje}')">📱 WhatsApp</button>
                    </div>
                    <div class="replies">
                        ${r_list.map(r => `<div class="reply-item">↳ ${r.mensaje}</div>`).join('')}
                        <input type="text" class="reply-input" placeholder="Comentar algo..." onkeypress="comentar(${c.id}, event)">
                    </div>
                </div>
            `;
        }).join('');
    }

    client.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'confesiones' }, render).subscribe();
    render();
</script>
</body>
</html>
