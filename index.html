<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confesionario Oficial</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#3b82f6;
  --success:#10b981;
  --text:#f1f5f9;
  --dim:#94a3b8;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  display:flex;
  justify-content:center;
}
.container{
  width:100%;
  max-width:500px;
  padding:15px;
}
.post-box,.card{
  background:var(--card);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}
textarea{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  font-size:16px;
  outline:none;
  resize:none;
  min-height:80px;
}
.btn-post{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:12px;
  cursor:pointer;
  float:right;
}
.author{
  font-size:0.85rem;
  font-weight:bold;
  color:var(--accent);
  margin-bottom:10px;
}
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.btn-sm{
  background:#334155;
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:10px;
  cursor:pointer;
}
.replies{
  margin-top:10px;
}
.reply-in{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1px solid #475569;
  color:white;
  padding:6px 0;
}
</style>
</head>
<body>

<div class="container">
  <h1>🤫 Confesionario Oficial</h1>

  <div class="post-box">
    <textarea id="mainIn" placeholder="¿Qué quieres confesar hoy?"></textarea>
    <button class="btn-post" onclick="enviarFinal()">Publicar</button>
  </div>

  <div id="muro"></div>
</div>

<script>
const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
const SUPABASE_KEY = 'TU_ANON_KEY';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const animales = ["Lobo","Zorro","Panda","Tigre","León","Águila","Leopardo","Búho"];

function escudar(texto){
  const p=document.createElement('p');
  p.textContent=texto;
  return p.innerHTML;
}

async function enviarFinal(){
  const msg=document.getElementById('mainIn').value;
  if(!msg.trim()) return;

  const anon=animales[Math.floor(Math.random()*animales.length)]+" Anónimo";

  const {error}=await client.from('confesiones').insert([{
    mensaje:msg,
    autor:anon,
    likes:0
  }]);

  if(!error){
    document.getElementById('mainIn').value='';
    cargarDatos();
  }else{
    console.error(error);
    alert("Error al publicar");
  }
}

async function darLike(id){
  const {data,error}=await client
    .from('confesiones')
    .select('likes')
    .eq('id',id)
    .single();

  if(error) return;

  await client
    .from('confesiones')
    .update({likes:(data.likes||0)+1})
    .eq('id',id);

  cargarDatos();
}

async function responder(id,e){
  if(e.key==='Enter' && e.target.value.trim()){
    await client.from('respuestas').insert([{
      mensaje:e.target.value,
      confesion_id:id
    }]);
    e.target.value='';
    cargarDatos();
  }
}

async function cargarDatos(){
  const {data:posts}=await client
    .from('confesiones')
    .select('*')
    .order('created_at',{ascending:false});

  const {data:resps}=await client
    .from('respuestas')
    .select('*');

  const muro=document.getElementById('muro');

  muro.innerHTML=(posts||[]).map(p=>{
    const las_resps=(resps||[]).filter(r=>r.confesion_id===p.id);

    return `
      <div class="card">
        <div class="author">${escudar(p.autor)}</div>
        <div>${escudar(p.mensaje)}</div>

        <div class="actions">
          <button class="btn-sm" onclick="darLike(${p.id})">
            ❤️ ${p.likes||0}
          </button>
        </div>

        <div class="replies">
          ${las_resps.map(r=>`<div>↳ ${escudar(r.mensaje)}</div>`).join('')}
          <input class="reply-in" placeholder="Comentar..." onkeypress="responder(${p.id},event)">
        </div>
      </div>
    `;
  }).join('');
}

window.onload=cargarDatos;
</script>
</body>
</html>
