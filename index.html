<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Oficial | Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Nueva Tipografía Profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.6); --accent: #3b82f6;
            --success: #10b981; --text: #f8fafc; --dim: #94a3b8; --danger: #ef4444; --warning: #f59e0b;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        /* Barra de Anuncio Superior */
        #globalAlert { display:none; background: linear-gradient(90deg, #dc2626, #991b1b); color: white; padding: 12px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 999; width: 100%; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); }

        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        header { text-align: center; padding: 30px 0 20px 0; }
        
        .live { font-size: 0.75rem; color: var(--success); display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Estilo Glassmorphism para las cajas */
        .glass-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
        }

        .post-box { margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 80px; font-family: inherit; }
        textarea::placeholder { color: #64748b; }
        
        .btn-post { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 12px 24px; border-radius: 14px; font-weight: 600; cursor: pointer; float: right; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-post:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
        .btn-post:active { transform: scale(0.95); }

        /* Estilo de las Confesiones */
        .card { margin-bottom: 20px; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; width: 100%; box-sizing: border-box; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .author { font-size: 0.85rem; font-weight: 800; color: #60a5fa; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge { background: linear-gradient(135deg, #ec4899, #be185d); color: white; font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 800; }
        .mensaje-texto { font-size: 1.15rem; color: #f8fafc; line-height: 1.5; word-wrap: break-word; }
        
        .actions { display: flex; gap: 12px; margin-top: 18px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-sm { background: rgba(51, 65, 85, 0.6); border: 1px solid transparent; color: white; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-sm:hover { background: rgba(71, 85, 105, 0.8); }
        .btn-sm:disabled { opacity: 0.8; cursor: not-allowed; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); }

        /* Respuestas/Comentarios */
        .replies { margin-top: 15px; background: rgba(0,0,0,0.25); border-radius: 16px; padding: 15px; }
        .reply-txt { color: #cbd5e1; font-size: 0.9rem; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 6px; line-height: 1.4; }
        .reply-in { width: 100%; background: transparent; border: none; color: white; border-bottom: 1px solid rgba(255,255,255,0.1); outline: none; font-size: 0.9rem; margin-top: 10px; padding-bottom: 5px; transition: border-color 0.2s; }
        .reply-in:focus { border-bottom: 1px solid var(--accent); }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-card { text-align: center; width: 85%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal-card h3 { margin-top: 10px; margin-bottom: 5px; }
        .modal-card input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; text-align: center; font-size: 1rem; outline: none; transition: border 0.2s; }
        .modal-card input:focus { border-color: var(--accent); }

        /* BOTÓN ADMIN AHORA VISIBLE */
        #adminTrigger { position:fixed; bottom:20px; left:20px; width:45px; height:45px; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: var(--dim); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor:pointer; z-index: 10001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(8px); transition: all 0.2s; }
        #adminTrigger:hover { color: white; border-color: var(--accent); transform: rotate(45deg); }
    </style>
</head>
<body>

<!-- Alerta Global -->
<div id="globalAlert">
    <span id="alertText">📢 ANUNCIO</span>
    <button onclick="cerrarAlerta()" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer; margin-left:15px; font-size:1.1rem; opacity:0.8;">✕</button>
</div>

<div class="container">
    <header>
        <div class="live"><div class="dot"></div> SISTEMA PROTEGIDO CON RLS</div>
        <h1 style="font-size: 2.5rem; margin: 5px 0; font-weight: 800; letter-spacing: -1px;">🤫 Confesionario</h1>
        <p style="color: var(--dim); font-size: 0.95rem; margin-top:5px;">Seguro, anónimo y sin filtros.</p>
    </header>

    <div class="glass-box post-box">
        <textarea id="mainIn" placeholder="¿Qué secreto tienes hoy?"></textarea>
        <div style="overflow: auto; margin-top: 10px;">
            <button class="btn-post" onclick="abrirModal()">Publicar</button>
        </div>
    </div>

    <div id="muro"></div>
</div>

<!-- Modal Registro Usuario -->
<div id="modalVerifica" class="modal-overlay">
    <div class="glass-box modal-card">
        <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
        <h3>Verificación de Seguridad</h3>
        <p style="font-size: 0.85rem; color: var(--dim); margin-bottom: 15px; line-height: 1.4;">Para evitar bots, necesitamos saber que eres humano. Tu nombre será ocultado.</p>
        <input type="text" id="nombreReal" placeholder="Tu nombre y apellido">
        <button class="btn-post" style="float:none; width:100%; padding: 15px; margin-top: 10px;" onclick="enviarFinal()">Confirmar y Enviar</button>
        <button class="btn-sm" style="background: transparent; margin: 15px auto 0 auto; color: var(--dim);" onclick="document.getElementById('modalVerifica').style.display='none'">Cancelar</button>
    </div>
</div>

<!-- Panel Admin -->
<div id="panelAdmin" class="modal-overlay">
    <div class="glass-box modal-card" style="border: 1px solid var(--accent);">
        <h3 style="color: var(--accent);">⚙️ Centro de Mando Admin</h3>
        <input type="text" id="adminCommandInput" placeholder="Mensaje para anuncio o evento...">
        
        <button class="btn-post" style="float:none; width:100%; margin-bottom:12px;" onclick="lanzarEvento()">Lanzar como Post 🔥</button>
        <button class="btn-post" style="float:none; width:100%; margin-bottom:25px; background: linear-gradient(135deg, #f59e0b, #d97706);" onclick="publicarAnuncio()">Poner en Barra Roja 📢</button>
        
        <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;"></div>
        
        <button class="btn-post" style="float:none; width:100%; background: linear-gradient(135deg, #ef4444, #b91c1c);" onclick="resetTodo()">🔥 VACIAR MURO (SEGURIDAD RPC)</button>
        <button class="btn-sm" style="margin-top:20px; width:100%; justify-content:center;" onclick="cerrarAdmin()">Cerrar Panel</button>
    </div>
</div>

<!-- BOTÓN ADMIN -->
<div id="adminTrigger" onclick="checkAdmin()">⚙️</div>

<script>
    // CONFIGURACIÓN SUPABASE (Tus claves públicas)
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const animales =;

    // Previene inyección de código (XSS)
    function escudar(texto) {
        const p = document.createElement('p');
        p.textContent = texto;
        return p.innerHTML;
    }

    // --- LÓGICA DE USUARIO ---
    function abrirModal() {
        if(!document.getElementById('mainIn').value.trim()) return;
        document.getElementById('modalVerifica').style.display = 'flex';
    }

    async function enviarFinal() {
        const msg = document.getElementById('mainIn').value;
        const real = document.getElementById('nombreReal').value;
        if(real.trim().length < 3) return alert("Por favor, ingresa tu nombre real.");

        let ip = "0.0.0.0";
        try { const resp = await fetch('https://api.ipify.org?format=json'); const data = await resp.json(); ip = data.ip; } catch(e) {}
        
        const ua = navigator.userAgent;
        const disp = ua.includes("iPhone") ? "iPhone" : (ua.includes("Android") ? "Android" : "PC");
        const anon = animales + " Anónimo";

        const { error } = await client.from('confesiones').insert();

        if(!error) {
            document.getElementById('mainIn').value = '';
            document.getElementById('nombreReal').value = '';
            document.getElementById('modalVerifica').style.display = 'none';
            cargarDatos();
        } else {
            console.error("Error enviando:", error);
            alert("Hubo un error al publicar. Intenta nuevamente.");
        }
    }

    async function darLike(id) {
        let misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');
        if(misLikes.includes(id)) return;
        
        const { error } = await client.rpc('incrementar_like', { confesion_id: id });
        if(!error) {
            misLikes.push(id);
            localStorage.setItem('likes_v1', JSON.stringify(misLikes));
            cargarDatos();
        }
    }

    async function responder(id, e) {
        if(e.key === 'Enter' && e.target.value.trim()){
            const { error } = await client.from('respuestas').insert();
            if(!error) {
                e.target.value = '';
                cargarDatos();
            }
        }
    }

    // --- CARGA DE DATOS ---
    async function cargarDatos() {
    // EL CAMBIO ESTÁ AQUÍ: Solo pedimos id, mensaje, autor y likes.
    // NO pedimos ni nombre_real ni direccion_ip.
    const { data: posts, error: errorP } = await client.from('confesiones')
        .select('id, mensaje, autor, likes') 
        .order('created_at', { ascending: false });
    
    const { data: resps, error: errorR } = await client.from('respuestas')
        .select('mensaje, confesion_id')
        .order('created_at', { ascending: true });
    
    if (errorP) {
        console.error("Error cargando posts:", errorP);
        // Si sale error aquí, es porque el RLS todavía bloquea la lectura
        return;
    }

    const muro = document.getElementById('muro');
    if (!posts || posts.length === 0) {
        muro.innerHTML = "<p style='text-align:center; color:gray;'>No hay confesiones aún. ¡Sé el primero!</p>";
        return;
    }

    const misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');

    muro.innerHTML = posts.map((p, index) => {
        const yaVoto = misLikes.includes(p.id);
        const las_resps = resps ? resps.filter(r => r.confesion_id === p.id) : [];
        const esTop = (p.likes >= 5) ? '<span class="badge">🔥 TOP</span>' : '';
        const animDelay = index * 0.1;
        
        return `
            <div class="glass-box card" style="animation-delay: ${animDelay}s">
                <div class="author">👤 ${escudar(p.autor)} ${esTop}</div>
                <div class="mensaje-texto">${escudar(p.mensaje)}</div>
                <div class="actions">
                    <button class="btn-sm" onclick="darLike(${p.id})" ${yaVoto ? 'disabled' : ''}>
                        ${yaVoto ? '✅' : '❤️'} ${p.likes || 0}
                    </button>
                    <button class="btn-sm" style="background: rgba(37, 211, 102, 0.2); border-color: #25d366; color: #25d366;" onclick="window.open('https://wa.me/?text=¡Mira esta confesión!🤫:%0A%0A%22${encodeURIComponent(p.mensaje)}%22')">WhatsApp</button>
                </div>
                <div class="replies">
                    ${las_resps.map(r => `<div class="reply-txt">↳ ${escudar(r.mensaje)}</div>`).join('')}
                    <input type="text" class="reply-in" placeholder="Comentar..." onkeypress="responder(${p.id}, event)">
                </div>
            </div>`;
    }).join('');
    }
.

    // --- LÓGICA DE ADMINISTRADOR ---
    async function checkAdmin() {
        const pw = prompt("Clave de Administrador:");
        if(!pw) return;
        const { data: esAdmin, error } = await client.rpc('verificar_admin', { pass_ingresada: pw });
        if(esAdmin) document.getElementById('panelAdmin').style.display = 'flex';
        else alert("Acceso denegado.");
    }

    function cerrarAdmin() { document.getElementById('panelAdmin').style.display = 'none'; }

    async function lanzarEvento() {
        const n = document.getElementById('adminCommandInput').value;
        if(!n) return;
        await client.from('confesiones').insert();
        cerrarAdmin();
        cargarDatos();
    }

    function publicarAnuncio() {
        const t = document.getElementById('adminCommandInput').value;
        if(!t) return;
        localStorage.setItem('anuncio_global', t);
        mostrarBarra(t);
        cerrarAdmin();
    }

    function mostrarBarra(txt) {
        document.getElementById('alertText').innerHTML = "📢 " + txt.toUpperCase();
        document.getElementById('globalAlert').style.display = 'block';
    }

    function cerrarAlerta() {
        document.getElementById('globalAlert').style.display = 'none';
        localStorage.removeItem('anuncio_global');
    }

    // NUEVO MÉTODO SEGURO DE BORRADO
    async function resetTodo() {
        const pw = prompt("Para confirmar el borrado masivo, ingresa la clave maestra de la Base de Datos:");
        if(!pw) return;
        if(!confirm("⚠️ ADVERTENCIA: ¿Estás 100% seguro de borrar toda la base de datos? Esto no se puede deshacer.")) return;
        
        // Ahora llama a la función RPC segura de Supabase en lugar de intentar hacer un .delete() directo
        const { error } = await client.rpc('borrar_muro_seguro', { pass_ingresada: pw });
        
        if(!error) {
            alert("Muro limpiado correctamente por el administrador.");
            location.reload();
        } else {
            alert("Error: No tienes permisos, las políticas RLS bloquearon la acción, o la función RPC no existe.");
            console.error(error);
        }
    }

    // INICIO Y REALTIME
    window.onload = () => {
        const adv = localStorage.getItem('anuncio_global');
        if(adv) mostrarBarra(adv);
        cargarDatos();
    };

    client.channel('cambios_muro').on('postgres_changes', { event: '*', schema: 'public', table: 'confesiones' }, cargarDatos).subscribe();
    client.channel('cambios_resp').on('postgres_changes', { event: '*', schema: 'public', table: 'respuestas' }, cargarDatos).subscribe();
</script>
</body>
</html>
