<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Master | Admin & Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6;
            --success: #10b981; --text: #f1f5f9; --dim: #94a3b8; --danger: #ef4444; --warning: #f59e0b;
            --admin-msg: #4f46e5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra de Anuncio Roja */
        #globalAlert { display:none; background: #dc2626; color: white; padding: 12px; text-align: center; font-weight: bold; width: 100%; position: sticky; top: 0; z-index: 999; border-bottom: 2px solid #7f1d1d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        header { text-align: center; padding: 20px 0; }
        
        .stats-bar { font-size: 0.75rem; color: var(--dim); margin-top: 8px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .live-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

        .post-box { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 80px; font-family: inherit; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; transition: 0.2s; }
        .btn-post:active { transform: scale(0.95); }

        /* Confesiones */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .author { font-size: 0.8rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; color: white; font-weight: bold; text-transform: uppercase; }
        .bg-custom { background: #8b5cf6; }
        .bg-top { background: #ec4899; }

        .actions { margin-top: 12px; display: flex; gap: 10px; }
        .btn-adm { font-size: 11px; padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }

        /* Respuestas */
        .replies { margin-top: 15px; background: rgba(0,0,0,0.25); border-radius: 15px; padding: 12px; }
        .reply-txt { font-size: 0.85rem; margin-bottom: 6px; padding: 8px; border-radius: 8px; color: var(--dim); line-height: 1.4; }
        .reply-admin { background: var(--admin-msg); color: white !important; border-left: 4px solid #fff; font-weight: 500; }
        .reply-in { width: 100%; background: transparent; border: none; color: white; border-bottom: 1px solid #475569; outline: none; font-size: 0.85rem; margin-top: 10px; }

        /* Admin Layout */
        .admin-controls { display: none; background: rgba(59, 130, 246, 0.1); margin-top: 15px; padding: 12px; border-radius: 12px; border: 1px dashed var(--accent); gap: 8px; flex-wrap: wrap; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.97); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        .modal-card input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 12px; background: #0f172a; color: white; border: 1px solid #475569; box-sizing: border-box; }

        #adminTrigger { position:fixed; bottom:20px; left:20px; width:48px; height:48px; background: #1e293b; border: 1px solid var(--accent); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor:pointer; z-index: 10001; box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-size: 22px; }
    </style>
</head>
<body>

<div id="globalAlert">
    <span id="alertText">Cargando anuncios...</span>
</div>

<div class="container">
    <header>
        <h1 style="margin:0; font-size: 2.2rem;">🤫 Confesionario</h1>
        <div class="stats-bar">
            <span class="live-dot"></span> <span id="visitCount">0</span> visitas
        </div>
    </header>

    <div class="post-box">
        <textarea id="mainIn" placeholder="¿Qué quieres confesar hoy de forma anónima?"></textarea>
        <div style="overflow:auto"><button class="btn-post" onclick="abrirModal()">Publicar</button></div>
    </div>

    <div id="muro"></div>
</div>

<div id="modalVerifica" class="modal-overlay">
    <div class="modal-card">
        <h3>🛡️ Seguridad</h3>
        <p style="font-size:0.85rem; color:var(--dim)">Tu nombre real solo lo verá el administrador.</p>
        <input type="text" id="nombreReal" placeholder="Nombre completo">
        <button class="btn-post" style="width:100%; float:none; padding:15px" onclick="enviarFinal()">Subir Confesión</button>
    </div>
</div>

<div id="adminTrigger" onclick="checkAdmin()">⚙️</div>

<script>
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;

    async function cargarTodo() {
        // 1. Cargar Configuración (Anuncio y Visitas)
        const { data: config } = await client.from('config').select('clave, valor');
        if(config) {
            const an = config.find(c => c.clave === 'anuncio')?.valor;
            const vi = config.find(c => c.clave === 'visitas')?.valor;
            if(an && an.trim() !== "") {
                document.getElementById('alertText').innerText = "📢 " + an;
                document.getElementById('globalAlert').style.display = 'block';
            } else {
                document.getElementById('globalAlert').style.display = 'none';
            }
            document.getElementById('visitCount').innerText = vi || 0;
        }

        // 2. Cargar Confesiones (SOLO COLUMNAS PÚBLICAS para evitar error RLS)
        const { data: posts, error: e1 } = await client.from('confesiones')
            .select('id, mensaje, autor, likes, created_at, etiqueta_admin')
            .order('created_at', { ascending: false });

        // 3. Cargar Respuestas
        const { data: resps } = await client.from('respuestas').select('*').order('created_at', { ascending: true });
        
        const muro = document.getElementById('muro');
        const misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');

        if(!posts || posts.length === 0) {
            muro.innerHTML = "<p style='text-align:center; color:gray; margin-top:20px'>Aún no hay confesiones. ¡Sé el primero!</p>";
            return;
        }

        muro.innerHTML = posts.map(p => {
            const yaVoto = misLikes.includes(p.id);
            const filtradas = resps ? resps.filter(r => r.confesion_id === p.id) : [];
            let badge = p.etiqueta_admin ? `<span class="badge bg-custom">💎 ${p.etiqueta_admin}</span>` : (p.likes >= 5 ? `<span class="badge bg-top">🔥 TOP</span>` : '');

            return `
                <div class="card">
                    <div class="author">👤 ${p.autor} ${badge}</div>
                    <div style="color: white; font-size: 1.1rem; line-height:1.4">${p.mensaje}</div>
                    
                    <div class="actions">
                        <button class="btn-adm" onclick="darLike(${p.id})" ${yaVoto ? 'disabled' : ''} style="background:rgba(255,255,255,0.1); border:1px solid #334155; color:${yaVoto ? '#10b981':'white'}">
                            ${yaVoto ? '✅' : '❤️'} ${p.likes || 0}
                        </button>
                    </div>

                    <div class="admin-controls" style="display:${isAdmin ? 'flex' : 'none'}">
                        <button class="btn-adm" style="background:var(--accent)" onclick="cambiarTag(${p.id})">🏷️ Etiqueta</button>
                        <button class="btn-adm" style="background:var(--danger)" onclick="borrarPost(${p.id})">🗑️ Borrar</button>
                    </div>

                    <div class="replies">
                        ${filtradas.map(r => `
                            <div class="reply-txt ${r.es_admin ? 'reply-admin' : ''}">
                                ${r.es_admin ? '🛡️ ' : '↳ '} ${r.mensaje}
                                ${isAdmin ? `<span onclick="borrarResp(${r.id})" style="color:red; cursor:pointer; margin-left:8px; font-weight:bold">×</span>` : ''}
                            </div>`).join('')}
                        <input type="text" class="reply-in" placeholder="${isAdmin ? 'Responder como Admin...' : 'Escribe un comentario...'}" onkeypress="responder(${p.id}, event)">
                    </div>
                </div>`;
        }).join('');
    }

    // --- LOGICA ADMIN ---
    async function checkAdmin() {
        const pw = prompt("Clave Maestra:");
        if(!pw) return;
        const { data: ok } = await client.rpc('verificar_admin', { pass_ingresada: pw });
        if(ok) {
            isAdmin = true;
            const op = prompt("1: Panel / 2: Cambiar Anuncio / 3: Borrar Todo");
            if(op == "2") {
                const msg = prompt("Nuevo anuncio (dejar vacío para quitar):");
                await client.from('config').update({ valor: msg }).eq('clave', 'anuncio');
            } else if(op == "3") {
                if(confirm("¿Borrar todo?")) await client.from('confesiones').delete().neq('id', 0);
            }
            cargarTodo();
        } else alert("Clave incorrecta");
    }

    async function cambiarTag(id) {
        const n = prompt("Nombre de la etiqueta:");
        if(n !== null) { await client.from('confesiones').update({ etiqueta_admin: n }).eq('id', id); cargarTodo(); }
    }

    async function borrarPost(id) { if(confirm("¿Borrar?")) { await client.from('confesiones').delete().eq('id', id); cargarTodo(); } }
    async function borrarResp(id) { await client.from('respuestas').delete().eq('id', id); cargarTodo(); }

    // --- LOGICA USUARIO ---
    async function incrementarVisitas() {
        if(!sessionStorage.getItem('visto')) {
            await client.rpc('incrementar_visitas_config');
            sessionStorage.setItem('visto', '1');
        }
    }

    function abrirModal() { if(document.getElementById('mainIn').value.trim()) document.getElementById('modalVerifica').style.display = 'flex'; }
    
    async function enviarFinal() {
        const msg = document.getElementById('mainIn').value;
        const real = document.getElementById('nombreReal').value;
        if(real.trim().length < 2) return alert("Escribe tu nombre.");
        const anons = ["Panda", "Zorro", "Halcon", "Lobo", "Tigre"];
        const anon = anons[Math.floor(Math.random()*anons.length)] + " Anónimo";
        
        const { error } = await client.from('confesiones').insert([{ mensaje: msg, autor: anon, nombre_real: real, likes: 0 }]);
        if(!error) {
            document.getElementById('mainIn').value = '';
            document.getElementById('modalVerifica').style.display = 'none';
            cargarTodo();
        }
    }

    async function darLike(id) {
        await client.rpc('incrementar_like', { confesion_id: id });
        if(!isAdmin) {
            let misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');
            misLikes.push(id);
            localStorage.setItem('likes_v1', JSON.stringify(misLikes));
        }
        cargarTodo();
    }

    async function responder(id, e) {
        if(e.key === 'Enter' && e.target.value.trim()){
            await client.from('respuestas').insert([{ mensaje: e.target.value, confesion_id: id, es_admin: isAdmin }]);
            e.target.value = '';
            cargarTodo();
        }
    }

    window.onload = async () => {
        await incrementarVisitas();
        cargarTodo();
    };

    // Realtime
    client.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public' }, cargarTodo).subscribe();
</script>
</body>
</html>
