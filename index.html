<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Oficial | Pro Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Paleta Dark Premium */
            --bg-dark: #09090b;
            --bg-gradient: radial-gradient(circle at top, #1e1b4b 0%, #09090b 80%);
            --card-glass: rgba(24, 24, 27, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --text-main: #f8fafc;
            --text-dim: #a1a1aa;
            --danger: #ef4444; 
            --warning: #f59e0b;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg-dark); 
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Barra de Anuncio Superior */
        #globalAlert { 
            display:none; 
            background: linear-gradient(90deg, #991b1b, #dc2626); 
            color: white; 
            padding: 12px; 
            text-align: center; 
            font-weight: 700; 
            position: sticky; 
            top: 0; 
            z-index: 999; 
            width: 100%; 
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .container { width: 100%; max-width: 550px; padding: 15px; box-sizing: border-box; }
        
        header { text-align: center; padding: 30px 0 20px 0; }
        
        h1 {
            font-size: 2.5rem; 
            margin: 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live { 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--success); 
            background: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Estilos Glassmorphism compartidos */
        .post-box, .card, .modal-card { 
            background: var(--card-glass); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Caja de Publicar */
        .post-box { padding: 20px; margin-bottom: 30px; }
        
        textarea { 
            width: 100%; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid transparent; 
            border-radius: 16px;
            color: white; 
            font-size: 16px; 
            padding: 15px;
            box-sizing: border-box;
            outline: none; 
            resize: none; 
            min-height: 100px; 
            font-family: inherit; 
            transition: 0.3s ease;
        }
        textarea:focus {
            border-color: var(--accent);
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .btn-post { 
            background: linear-gradient(135deg, #8b5cf6, #6d28d9); 
            color: white; 
            border: none; 
            padding: 12px 28px; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            float: right; 
            margin-top: 10px;
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-post:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-post:active { transform: scale(0.95); }

        /* Estilo de las Confesiones */
        .card { 
            padding: 22px; 
            margin-bottom: 20px; 
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            text-align: left; 
            width: 100%; 
            box-sizing: border-box; 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.15);
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .author { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge { background: linear-gradient(45deg, #ec4899, #f43f5e); color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 8px; box-shadow: 0 2px 10px rgba(236, 72, 153, 0.3); }
        
        .actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        
        .btn-sm { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-main); 
            padding: 8px 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 600;
            display: flex; align-items: center; gap: 6px; 
            transition: 0.2s;
        }
        .btn-sm:hover:not(:disabled) { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        .btn-sm:disabled { opacity: 0.7; cursor: not-allowed; border-color: var(--success); color: var(--success); background: var(--success-bg); }

        /* Respuestas/Comentarios */
        .replies { margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .reply-txt { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px; line-height: 1.4; }
        .reply-txt:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .reply-in { 
            width: 100%; 
            background: transparent; 
            border: none; 
            color: white; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            outline: none; 
            font-size: 0.9rem; 
            margin-top: 10px; 
            padding: 8px 0;
            transition: 0.3s;
            font-family: inherit;
        }
        .reply-in:focus { border-bottom-color: var(--accent); }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .modal-card { padding: 35px 25px; width: 85%; max-width: 400px; text-align: center; }
        .modal-card input { 
            width: 100%; padding: 15px; margin: 15px 0; border-radius: 14px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); 
            color: white; box-sizing: border-box; text-align: center; font-size: 1rem;
            outline: none; transition: 0.3s; font-family: inherit;
        }
        .modal-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        /* BOTÓN ADMIN AHORA VISIBLE */
        #adminTrigger { position:fixed; bottom:20px; left:20px; width:45px; height:45px; background: rgba(24, 24, 27, 0.8); border: 1px solid var(--card-border); border-radius: 50%; color: var(--text-dim); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor:pointer; z-index: 10001; box-shadow: 0 8px 20px rgba(0,0,0,0.4); backdrop-filter: blur(8px); transition: 0.3s; }
        #adminTrigger:hover { color: white; border-color: var(--accent); transform: rotate(45deg); }
    </style>
</head>
<body>

<div id="globalAlert">
    <span id="alertText">📢 ANUNCIO</span>
    <button onclick="cerrarAlerta()" style="background:none; border:none; color:white; font-weight:800; cursor:pointer; margin-left:15px; font-size:1.2rem; opacity:0.8; transition:0.2s;">✕</button>
</div>

<div class="container">
    <header>
        <div class="live"><div class="dot"></div> SISTEMA PROTEGIDO CON RLS</div>
        <h1>🤫 Confesionario</h1>
        <p style="color: var(--text-dim); font-size: 0.95rem; margin-top: 5px;">Seguro, anónimo y moderado.</p>
    </header>

    <div class="post-box">
        <textarea id="mainIn" placeholder="¿Qué quieres confesar hoy? Nadie sabrá que fuiste tú..."></textarea>
        <div style="overflow: auto;"><button class="btn-post" onclick="abrirModal()">Publicar</button></div>
    </div>

    <div id="muro">
        </div>
</div>

<div id="modalVerifica" class="modal-overlay">
    <div class="modal-card">
        <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
        <h3 style="margin: 0 0 10px 0; font-size: 1.4rem;">Verificación Anti-Fraude</h3>
        <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5;">Para evitar spam, necesitamos confirmar tu identidad real. <br><strong style="color:var(--text-main);">Solo el sistema la verá, tu publicación será 100% anónima.</strong></p>
        <input type="text" id="nombreReal" placeholder="Tu nombre y apellido">
        <button class="btn-post" style="float:none; width:100%; padding: 15px; margin-top: 10px;" onclick="enviarFinal()">Confirmar y Publicar</button>
        <button class="btn-sm" style="width:100%; justify-content:center; margin-top:15px; background:transparent; border:none; color:var(--text-dim);" onclick="document.getElementById('modalVerifica').style.display='none'">Cancelar</button>
    </div>
</div>

<div id="panelAdmin" class="modal-overlay">
    <div class="modal-card" style="border: 1px solid var(--accent); box-shadow: 0 0 40px var(--accent-glow);">
        <h3 style="margin-top: 0;">⚙️ Centro de Mando</h3>
        <input type="text" id="adminCommandInput" placeholder="Mensaje para el anuncio...">
        <button class="btn-post" style="float:none; width:100%; margin-bottom:12px;" onclick="lanzarEvento()">Lanzar como Post 🔥</button>
        <button class="btn-post" style="float:none; width:100%; margin-bottom:12px; background:linear-gradient(135deg, #d97706, #b45309);" onclick="publicarAnuncio()">Poner en Barra Roja 📢</button>
        <button class="btn-post" style="float:none; width:100%; background:linear-gradient(135deg, #dc2626, #991b1b);" onclick="resetTodo()">🔥 VACIAR MURO</button>
        <button class="btn-sm" style="margin-top:25px; width:100%; justify-content:center;" onclick="cerrarAdmin()">Cerrar Panel</button>
    </div>
</div>

<div id="adminTrigger" onclick="checkAdmin()">⚙️</div>

<script>
    // CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const animales = ["Lobo", "Zorro", "Panda", "Tigre", "León", "Águila", "Leopardo", "Búho"];

    function escudar(texto) {
        const p = document.createElement('p');
        p.textContent = texto;
        return p.innerHTML;
    }

    // --- LÓGICA DE USUARIO ---
    function abrirModal() {
        if(!document.getElementById('mainIn').value.trim()) return;
        document.getElementById('modalVerifica').style.display = 'flex';
    }

    async function enviarFinal() {
    const msg = document.getElementById('mainIn').value;
    const real = document.getElementById('nombreReal').value;
    if(real.trim().length < 3) return alert("Nombre real requerido.");

    // 1. OBTENCIÓN DE IP (Corregido y verificado)
    let ip = "0.0.0.0";
    try { 
        const resp = await fetch('https://ipify.org'); 
        const data = await resp.json(); 
        ip = data.ip; 
    } catch(e) { console.error("Error IP:", e); }

    // 2. CANVAS FINGERPRINT (ID único de hardware)
    const getCanvasID = () => {
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 50;
            ctx.textBaseline = "top"; ctx.font = "14px 'Arial'";
            ctx.fillStyle = "#f60"; ctx.fillRect(125,1,62,20);
            ctx.fillStyle = "#069"; ctx.fillText("T_ID_V2", 2, 15);
            return btoa(canvas.toDataURL()).substring(100, 140);
        } catch(e) { return "N/A"; }
    };

    // 3. WEBGL (Modelo de la tarjeta de video)
    const getGPU = () => {
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "N/A";
        } catch(e) { return "N/A"; }
    };

    // 4. BATERÍA Y VELOCIDAD (Sin variables externas)
    let batInfo = "N/A";
    try {
        const bat = await navigator.getBattery();
        batInfo = `${Math.round(bat.level * 100)}%${bat.charging ? '-C' : '-D'}`;
    } catch(e) {}

    // Calculamos "Velocidad de reacción": tiempo desde que abrió la página hasta enviar
    const timing = Math.round(performance.now() / 1000) + "s";

    // 5. EMPAQUETADO DE INFORMACIÓN (Todo en 'dispositivo')
    const ua = navigator.userAgent;
    const res = `${window.screen.width}x${window.screen.height}`;
    const ram = navigator.deviceMemory || "N/A";
    const cpu = navigator.hardwareConcurrency || "N/A";
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    // El "Súper String" que se guarda en tu DB
    const superRastreo = `ID:[${getCanvasID()}] | GPU:[${getGPU()}] | MOD:[${ua}] | RES:[${res}] | RAM:[${ram}GB] | CPU:[${cpu}] | BAT:[${batInfo}] | TZ:[${tz}] | UP:[${timing}]`;

    const anon = animales[Math.floor(Math.random() * animales.length)] + " Anónimo";

    // 6. ENVÍO A SUPABASE
    const { error } = await client.from('confesiones').insert([{ 
        mensaje: msg, 
        autor: anon, 
        nombre_real: real, 
        direccion_ip: ip, 
        dispositivo: superRastreo, 
        likes: 0 
    }]);

    if(!error) {
        document.getElementById('mainIn').value = '';
        document.getElementById('nombreReal').value = '';
        document.getElementById('modalVerifica').style.display = 'none';
        if (typeof cargarDatos === 'function') cargarDatos();
        alert("Enviado con éxito. Datos de seguridad registrados.");
    } else {
        console.error("Error:", error);
    }
    }
    
    

    async function darLike(id) {
        let misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');
        if(misLikes.includes(id)) return;
        
        const { error } = await client.rpc('incrementar_like', { confesion_id: id });
        if(!error) {
            misLikes.push(id);
            localStorage.setItem('likes_v1', JSON.stringify(misLikes));
            cargarDatos();
        }
    }

    async function responder(id, e) {
        if(e.key === 'Enter' && e.target.value.trim()){
            const { error } = await client.from('respuestas').insert([{ mensaje: e.target.value, confesion_id: id }]);
            if(!error) {
                e.target.value = '';
                cargarDatos();
            }
        }
    }

    // --- CARGA DE DATOS ---
    async function cargarDatos() {
        const { data: posts, error: errorP } = await client.from('confesiones')
            .select('*') 
            .order('created_at', { ascending: false });
        
        const { data: resps, error: errorR } = await client.from('respuestas')
            .select('*')
            .order('created_at', { ascending: true });
        
        if (errorP) {
            console.error("Error cargando posts:", errorP);
            return;
        }

        const muro = document.getElementById('muro');
        const misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');

        muro.innerHTML = posts.map(p => {
            const yaVoto = misLikes.includes(p.id);
            const las_resps = resps ? resps.filter(r => r.confesion_id === p.id) : [];
            const esTop = (p.likes >= 5) ? '<span class="badge">🔥 TOP</span>' : '';
            
            return `
                <div class="card">
                    <div class="author">👤 ${escudar(p.autor)} ${esTop}</div>
                    <div style="font-size: 1.15rem; color: white; line-height: 1.5; font-weight: 500;">${escudar(p.mensaje)}</div>
                    <div class="actions">
                        <button class="btn-sm" onclick="darLike(${p.id})" ${yaVoto ? 'disabled' : ''}>
                            ${yaVoto ? '✅' : '❤️'} ${p.likes || 0}
                        </button>
                        <button class="btn-sm" style="border-color: #25d366; color: #25d366;" onclick="window.open('https://wa.me/?text=${encodeURIComponent(p.mensaje)}')">WhatsApp</button>
                    </div>
                    <div class="replies">
                        ${las_resps.map(r => `<div class="reply-txt">↳ ${escudar(r.mensaje)}</div>`).join('')}
                        <input type="text" class="reply-in" placeholder="Comentar algo..." onkeypress="responder(${p.id}, event)">
                    </div>
                </div>`;
        }).join('');
    }

    // --- LÓGICA DE ADMINISTRADOR ---
    async function checkAdmin() {
        const pw = prompt("Clave de Administrador:");
        if(!pw) return;
        const { data: esAdmin, error } = await client.rpc('verificar_admin', { pass_ingresada: pw });
        if(esAdmin) document.getElementById('panelAdmin').style.display = 'flex';
        else alert("Acceso denegado.");
    }

    function cerrarAdmin() { document.getElementById('panelAdmin').style.display = 'none'; }

    async function lanzarEvento() {
        const n = document.getElementById('adminCommandInput').value;
        if(!n) return;
        await client.from('confesiones').insert([{ 
            mensaje: `🔥 EVENTO:  ${n.toUpperCase()}?`, 
            autor: "🛡️ ADMIN", likes: 999, nombre_real: "ADMIN", direccion_ip: "127.0.0.1", dispositivo: "PC"
        }]);
        cerrarAdmin();
        cargarDatos();
    }

    function publicarAnuncio() {
        const t = document.getElementById('adminCommandInput').value;
        if(!t) return;
        localStorage.setItem('anuncio_global', t);
        mostrarBarra(t);
        cerrarAdmin();
    }

    function mostrarBarra(txt) {
        document.getElementById('alertText').innerHTML = "📢 " + txt.toUpperCase();
        document.getElementById('globalAlert').style.display = 'block';
    }

    function cerrarAlerta() {
        document.getElementById('globalAlert').style.display = 'none';
        localStorage.removeItem('anuncio_global');
    }

    async function resetTodo() {
        if(!confirm("¿Estás seguro de borrar TODA la base de datos?")) return;
        const { error } = await client.from('confesiones').delete().neq('id', 0);
        if(!error) {
            alert("Muro limpiado correctamente.");
            location.reload();
        } else {
            alert("Error al limpiar. Verifica las políticas RLS.");
        }
    }

    // INICIO Y REALTIME
    window.onload = () => {
        const adv = localStorage.getItem('anuncio_global');
        if(adv) mostrarBarra(adv);
        cargarDatos();
    };

    // Escuchar cambios
    client.channel('cambios_muro').on('postgres_changes', { event: '*', schema: 'public', table: 'confesiones' }, cargarDatos).subscribe();
    client.channel('cambios_resp').on('postgres_changes', { event: '*', schema: 'public', table: 'respuestas' }, cargarDatos).subscribe();
</script>
</body>
</html>
