<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f1f5f9; --dim: #94a3b8; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        #globalAlert { display:none; background: #dc2626; color: white; padding: 10px; text-align: center; width: 100%; position: sticky; top: 0; z-index: 1000; font-weight: bold; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .post-box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; min-height: 80px; resize: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .author { color: var(--accent); font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; }
        .reply-box { margin-top: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; font-size: 0.85rem; }
        #adminGear { position: fixed; bottom: 20px; left: 20px; cursor: pointer; opacity: 0.5; font-size: 24px; }
    </style>
</head>
<body>

<div id="globalAlert"></div>

<div class="container">
    <header style="text-align:center; padding: 20px;">
        <h1 style="margin:0">🤫 Confesionario</h1>
        <p id="stats" style="font-size: 0.8rem; color: var(--dim);">Cargando...</p>
    </header>

    <div class="post-box">
        <textarea id="msgIn" placeholder="Escribe tu secreto..."></textarea>
        <div style="text-align: right;"><button class="btn" onclick="document.getElementById('modal').style.display='flex'">Publicar</button></div>
    </div>

    <div id="muro">Cargando confesiones...</div>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:2000;">
    <div style="background:var(--card); padding:20px; border-radius:15px; width:80%; max-width:300px;">
        <h3 style="margin-top:0">Identidad Real</h3>
        <p style="font-size:0.7rem; color:gray">Solo el admin verá tu nombre real.</p>
        <input type="text" id="nombreReal" placeholder="Nombre completo" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #444; background:#0f172a; color:white;">
        <button class="btn" style="width:100%" onclick="enviar()">Enviar Confesión</button>
    </div>
</div>

<div id="adminGear" onclick="loginAdmin()">⚙️</div>

<script>
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;

    async function cargarDatos() {
        try {
            // 1. Config (Anuncio y Visitas)
            const { data: config } = await client.from('config').select('*');
            if (config) {
                const anuncio = config.find(c => c.clave === 'anuncio')?.valor;
                const visitas = config.find(c => c.clave === 'visitas')?.valor;
                if (anuncio) {
                    document.getElementById('globalAlert').innerText = "📢 " + anuncio;
                    document.getElementById('globalAlert').style.display = 'block';
                }
                document.getElementById('stats').innerText = `${visitas || 0} visitas`;
            }

            // 2. Confesiones (Columnas exactas según tu imagen)
            const { data: posts, error: errPosts } = await client.from('confesiones')
                .select('id, mensaje, autor, likes')
                .order('id', { ascending: false });

            if (errPosts) throw errPosts;

            const { data: resps } = await client.from('respuestas').select('*');

            const muro = document.getElementById('muro');
            if (!posts || posts.length === 0) {
                muro.innerHTML = "No hay confesiones todavía.";
                return;
            }

            muro.innerHTML = posts.map(p => {
                const misResps = resps ? resps.filter(r => r.confesion_id === p.id) : [];
                return `
                    <div class="card">
                        <div class="author">👤 ${p.autor || 'Anónimo'}</div>
                        <div style="font-size:1.1rem">${p.mensaje}</div>
                        <div style="margin-top:10px;">
                            <button onclick="like(${p.id})" style="background:none; border:1px solid #444; color:white; border-radius:5px; cursor:pointer">❤️ ${p.likes || 0}</button>
                            ${isAdmin ? `<button onclick="borrar(${p.id})" style="color:red; background:none; border:none; margin-left:10px; cursor:pointer">Eliminar</button>` : ''}
                        </div>
                        <div class="reply-box">
                            ${misResps.map(r => `<div style="margin-bottom:5px; ${r.es_admin ? 'color:#3b82f6; font-weight:bold' : ''}">${r.es_admin ? '🛡️' : '↳'} ${r.mensaje}</div>`).join('')}
                            <input type="text" placeholder="Comentar..." onkeypress="responder(${p.id}, event)" style="width:100%; background:transparent; border:none; border-bottom:1px solid #444; color:white; outline:none; font-size:0.8rem; margin-top:5px;">
                        </div>
                    </div>
                `;
            }).join('');

        } catch (e) {
            console.error(e);
            document.getElementById('muro').innerHTML = "Error al cargar datos.";
        }
    }

    async function enviar() {
        const msg = document.getElementById('msgIn').value;
        const real = document.getElementById('nombreReal').value;
        if (!msg || !real) return alert("Faltan datos");

        const { error } = await client.from('confesiones').insert([
            { mensaje: msg, autor: "Anónimo", nombre_real: real, likes: 0 }
        ]);

        if (error) alert("Error: " + error.message);
        else {
            document.getElementById('msgIn').value = "";
            document.getElementById('modal').style.display = 'none';
            cargarDatos();
        }
    }

    async function loginAdmin() {
        const p = prompt("Clave Maestra:");
        // Ajustado a tu columna 'clave_admin'
        const { data } = await client.from('config_secreta').select('clave_admin').single();
        if (data && data.clave_admin === p) {
            isAdmin = true;
            alert("Acceso Administrador");
            const act = prompt("1: Cambiar Anuncio / 2: Ver Muro");
            if(act === "1") {
                const nuevo = prompt("Mensaje del anuncio:");
                await client.from('config').update({ valor: nuevo }).eq('clave', 'anuncio');
            }
            cargarDatos();
        }
    }

    async function responder(id, e) {
        if (e.key === 'Enter' && e.target.value) {
            await client.from('respuestas').insert([{ 
                confesion_id: id, 
                mensaje: e.target.value, 
                es_admin: isAdmin 
            }]);
            e.target.value = "";
            cargarDatos();
        }
    }

    async function like(id) {
        await client.rpc('incrementar_like', { confesion_id: id });
        cargarDatos();
    }

    async function borrar(id) {
        if(confirm("¿Eliminar para siempre?")) {
            await client.from('confesiones').delete().eq('id', id);
            cargarDatos();
        }
    }

    window.onload = () => {
        client.rpc('incrementar_visitas_config').catch(() => {});
        cargarDatos();
    };

    client.channel('public').on('postgres_changes', { event: '*', schema: 'public' }, () => cargarDatos()).subscribe();
</script>
</body>
</html>
