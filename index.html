<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Pro | Panel de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6;
            --success: #10b981; --text: #f1f5f9; --dim: #94a3b8; --danger: #ef4444; --warning: #f59e0b;
            --admin-msg: #4f46e5;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* BARRA ROJA GLOBAL */
        #globalAlert { display:none; background: #dc2626; color: white; padding: 14px; text-align: center; font-weight: bold; width: 100%; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid #7f1d1d; }

        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        header { text-align: center; padding: 25px 0; }
        
        /* CONTADOR */
        .stats { font-size: 0.75rem; color: var(--dim); background: rgba(255,255,255,0.05); padding: 6px 15px; border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); } 70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }

        .post-box { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 25px; border: 1px solid #334155; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 90px; font-family: inherit; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; transition: 0.2s; }
        .btn-post:active { transform: scale(0.95); }

        /* CONFESIONES */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .author { font-size: 0.8rem; font-weight: bold; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; color: white; font-weight: bold; text-transform: uppercase; }
        .bg-custom { background: #8b5cf6; }
        .bg-top { background: #ec4899; }

        .actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn-action { background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }

        /* PANEL ADMIN DENTRO DE CARD */
        .admin-zone { display: none; margin-top: 15px; padding: 15px; background: rgba(59, 130, 246, 0.1); border-radius: 12px; border: 1px dashed var(--accent); flex-wrap: wrap; gap: 8px; }
        .btn-adm { font-size: 10px; padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; }

        /* COMENTARIOS */
        .replies { margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; }
        .reply-item { font-size: 0.85rem; margin-bottom: 8px; padding: 8px; border-radius: 8px; color: var(--dim); position: relative; }
        .reply-admin { background: var(--admin-msg); color: white !important; font-weight: 500; border-left: 4px solid white; }
        .reply-in { width: 100%; background: transparent; border: none; color: white; border-bottom: 1px solid #475569; outline: none; font-size: 0.85rem; margin-top: 10px; }

        /* MODALES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal-card input { width: 100%; padding: 15px; margin: 12px 0; border-radius: 12px; background: #0f172a; color: white; border: 1px solid #475569; box-sizing: border-box; }

        /* BOTON FLOTANTE GEAR */
        #adminGear { position:fixed; bottom:25px; left:25px; width:50px; height:50px; background: #1e293b; border: 2px solid var(--accent); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor:pointer; z-index: 3000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); font-size: 24px; transition: 0.3s; }
        #adminGear:hover { transform: rotate(90deg) scale(1.1); }
    </style>
</head>
<body>

<!-- BARRA DE ANUNCIO -->
<div id="globalAlert">
    <span id="alertText">📢 Cargando...</span>
</div>

<div class="container">
    <header>
        <h1 style="margin:0; font-size: 2.5rem;">🤫 Confesionario</h1>
        <div class="stats">
            <div class="dot"></div> <span id="visitCount">0</span> visitas totales
        </div>
    </header>

    <div class="post-box">
        <textarea id="mainIn" placeholder="¿Qué quieres confesar hoy? Nadie sabrá quién eres..."></textarea>
        <div style="overflow:auto"><button class="btn-post" onclick="abrirModal()">Publicar</button></div>
    </div>

    <div id="muro"></div>
</div>

<!-- MODAL IDENTIDAD -->
<div id="modalVerifica" class="modal-overlay">
    <div class="modal-card">
        <h3 style="margin-top:0">🛡️ Verificación Requerida</h3>
        <p style="font-size:0.85rem; color:var(--dim)">Tu nombre real es privado, solo lo ve el administrador para evitar spam.</p>
        <input type="text" id="nombreReal" placeholder="Nombre completo">
        <button class="btn-post" style="width:100%; float:none; padding:18px" onclick="enviarFinal()">Confirmar y Publicar</button>
    </div>
</div>

<!-- MODAL PANEL ADMIN -->
<div id="modalAdmin" class="modal-overlay">
    <div class="modal-card" style="max-width:450px">
        <h3 style="color:var(--accent)">🛡️ Panel Maestro de Admin</h3>
        <p style="font-size:0.8rem; color:var(--dim)">Control de anuncios y mantenimiento global</p>
        
        <input type="text" id="inputAnuncio" placeholder="Mensaje para la barra roja...">
        <button class="btn-post" style="width:100%; float:none; background:var(--danger); margin-bottom:10px" onclick="setAnuncio()">Actualizar Anuncio 📢</button>
        <button class="btn-post" style="width:100%; float:none; background:var(--warning); margin-bottom:10px" onclick="borrarTodo()">BORRAR TODO EL MURO 💀</button>
        <button class="btn-post" style="width:100%; float:none; background:var(--accent)" onclick="cerrarAdmin()">Cerrar Panel</button>
    </div>
</div>

<div id="adminGear" onclick="loginAdmin()">⚙️</div>

<script>
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isAdmin = false;

    // --- CARGA DE DATOS ---
    async function refresh() {
        // 1. Configuración (Anuncio y Visitas)
        const { data: config } = await client.from('config').select('*');
        if(config) {
            const an = config.find(c => c.clave === 'anuncio')?.valor;
            const vi = config.find(c => c.clave === 'visitas')?.valor;
            if(an && an.trim() !== "") {
                document.getElementById('alertText').innerText = "📢 " + an;
                document.getElementById('globalAlert').style.display = 'block';
            } else {
                document.getElementById('globalAlert').style.display = 'none';
            }
            document.getElementById('visitCount').innerText = vi || 0;
        }

        // 2. Confesiones (SELECT ESPECÍFICO)
        const { data: posts } = await client.from('confesiones')
            .select('id, mensaje, autor, likes, created_at, etiqueta_admin')
            .order('created_at', { ascending: false });

        // 3. Respuestas
        const { data: resps } = await client.from('respuestas').select('*').order('created_at', { ascending: true });
        
        const muro = document.getElementById('muro');
        const misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');

        if(!posts || posts.length === 0) {
            muro.innerHTML = "<p style='text-align:center; color:gray; margin-top:30px'>No hay mensajes aún.</p>";
            return;
        }

        muro.innerHTML = posts.map(p => {
            const filtradas = resps ? resps.filter(r => r.confesion_id === p.id) : [];
            const liked = misLikes.includes(p.id);
            let badge = p.etiqueta_admin ? `<span class="badge bg-custom">💎 ${p.etiqueta_admin}</span>` : (p.likes >= 5 ? `<span class="badge bg-top">🔥 TOP</span>` : '');

            return `
                <div class="card">
                    <div class="author">👤 ${p.autor} ${badge}</div>
                    <div style="font-size: 1.15rem; color: white;">${p.mensaje}</div>
                    
                    <div class="actions">
                        <button class="btn-action" onclick="darLike(${p.id})" ${liked ? 'disabled' : ''} style="color:${liked ? '#10b981':'white'}">
                            ${liked ? '✅' : '❤️'} ${p.likes || 0}
                        </button>
                    </div>

                    <div class="admin-zone" style="display:${isAdmin ? 'flex' : 'none'}">
                        <button class="btn-adm" style="background:var(--accent)" onclick="tagPost(${p.id})">🏷️ Etiquetar</button>
                        <button class="btn-adm" style="background:var(--danger)" onclick="delPost(${p.id})">🗑️ Borrar</button>
                    </div>

                    <div class="replies">
                        ${filtradas.map(r => `
                            <div class="reply-item ${r.es_admin ? 'reply-admin' : ''}">
                                ${r.es_admin ? '🛡️ ' : '↳ '} ${r.mensaje}
                                ${isAdmin ? `<span onclick="delResp(${r.id})" style="color:red; cursor:pointer; margin-left:10px; font-weight:bold">×</span>` : ''}
                            </div>`).join('')}
                        <input type="text" class="reply-in" placeholder="${isAdmin ? 'Responder como ADMIN...' : 'Escribe un comentario...'}" onkeypress="responder(${p.id}, event)">
                    </div>
                </div>`;
        }).join('');
    }

    // --- FUNCIONES ADMIN ---
    async function loginAdmin() {
        const pw = prompt("Clave Maestra:");
        if(!pw) return;
        const { data: ok } = await client.rpc('verificar_admin', { pass_ingresada: pw });
        if(ok) {
            isAdmin = true;
            document.getElementById('modalAdmin').style.display = 'flex';
            refresh();
        } else alert("Error de acceso");
    }

    function cerrarAdmin() { document.getElementById('modalAdmin').style.display = 'none'; }

    async function setAnuncio() {
        const txt = document.getElementById('inputAnuncio').value;
        await client.from('config').update({ valor: txt }).eq('clave', 'anuncio');
        alert("Anuncio actualizado");
        refresh();
    }

    async function tagPost(id) {
        const t = prompt("Nueva etiqueta:");
        if(t !== null) { await client.from('confesiones').update({ etiqueta_admin: t }).eq('id', id); refresh(); }
    }

    async function delPost(id) { if(confirm("¿Eliminar?")) { await client.from('confesiones').delete().eq('id', id); refresh(); } }
    async function delResp(id) { await client.from('respuestas').delete().eq('id', id); refresh(); }
    async function borrarTodo() { if(confirm("¿BORRAR TODO?")) { await client.from('confesiones').delete().neq('id', 0); refresh(); } }

    // --- LOGICA DE USUARIO ---
    function abrirModal() { if(document.getElementById('mainIn').value.trim()) document.getElementById('modalVerifica').style.display = 'flex'; }
    
    async function enviarFinal() {
        const msg = document.getElementById('mainIn').value;
        const real = document.getElementById('nombreReal').value;
        if(real.length < 2) return alert("Escribe tu nombre real");
        
        const anons = ["Panda", "Zorro", "Halcon", "Lobo", "Tigre", "Fenix"];
        const anon = anons[Math.floor(Math.random()*anons.length)] + " Anónimo";
        
        await client.from('confesiones').insert([{ mensaje: msg, autor: anon, nombre_real: real, likes: 0 }]);
        document.getElementById('mainIn').value = '';
        document.getElementById('modalVerifica').style.display = 'none';
        refresh();
    }

    async function darLike(id) {
        await client.rpc('incrementar_like', { confesion_id: id });
        if(!isAdmin) {
            let mis = JSON.parse(localStorage.getItem('likes_v1') || '[]');
            mis.push(id);
            localStorage.setItem('likes_v1', JSON.stringify(mis));
        }
        refresh();
    }

    async function responder(id, e) {
        if(e.key === 'Enter' && e.target.value.trim()){
            await client.from('respuestas').insert([{ mensaje: e.target.value, confesion_id: id, es_admin: isAdmin }]);
            e.target.value = '';
            refresh();
        }
    }

    window.onload = async () => {
        if(!sessionStorage.getItem('v')) { await client.rpc('incrementar_visitas_config'); sessionStorage.setItem('v', '1'); }
        refresh();
    };

    // Realtime Total
    client.channel('maestro').on('postgres_changes', { event: '*', schema: 'public' }, refresh).subscribe();
</script>
</body>
</html>
