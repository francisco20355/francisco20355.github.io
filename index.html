<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confesionario Oficial Pro | Admin Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6;
            --success: #10b981; --text: #f1f5f9; --dim: #94a3b8; --danger: #ef4444; --warning: #f59e0b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra de Anuncio Global */
        #globalAlert { display:none; background: #dc2626; color: white; padding: 12px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 999; width: 100%; border-bottom: 2px solid #991b1b; }

        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        header { text-align: center; padding: 20px 0; }
        
        .live { font-size: 0.7rem; color: var(--success); display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 5px; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        .post-box { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 80px; font-family: inherit; }
        .btn-post { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; transition: 0.2s; }
        .btn-post:active { transform: scale(0.95); }

        /* Estilos de los Posts */
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .author { font-size: 0.8rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .badge { background: #ec4899; color: white; font-size: 10px; padding: 2px 8px; border-radius: 6px; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; padding-top: 12px; border-top: 1px solid #334155; }
        .btn-sm { background: #334155; border: none; color: white; padding: 7px 15px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.98); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 28px; width: 85%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .modal-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; text-align: center; }

        /* Botón Invisible Admin */
        #adminTrigger { position:fixed; bottom:10px; left:10px; width:30px; height:30px; opacity:0.1; cursor:pointer; z-index: 1000; }
    </style>
</head>
<body>

<div id="globalAlert">
    <span id="alertText">📢 ANUNCIO ACTIVO</span>
    <button onclick="cerrarAlerta()" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer; margin-left:15px;">✕</button>
</div>

<div class="container">
    <header>
        <div class="live"><div class="dot"></div> Sistema Protegido con RLS</div>
        <h1>🤫 Confesionario Oficial</h1>
        <p style="color: var(--dim); font-size: 0.8rem;">Seguro, anónimo y moderado.</p>
    </header>

    <div class="post-box">
        <textarea id="mainIn" placeholder="¿Qué quieres confesar hoy?"></textarea>
        <div style="overflow: auto;"><button class="btn-post" onclick="abrirModal()">Publicar</button></div>
    </div>

    <div id="muro"></div>
</div>

<!-- Modal Verificación Usuario -->
<div id="modalVerifica" class="modal-overlay">
    <div class="modal-card">
        <div style="font-size: 2.5rem;">🛡️</div>
        <h3>Verificación de Identidad</h3>
        <p style="font-size: 0.8rem; color: var(--dim);">Tu nombre e IP quedan registrados para evitar abusos.</p>
        <input type="text" id="nombreReal" placeholder="Tu nombre real">
        <button class="btn-post" style="float:none; width:100%; padding: 15px;" onclick="enviarFinal()">Confirmar Envío</button>
    </div>
</div>

<!-- Panel de Admin Secreto -->
<div id="panelAdmin" class="modal-overlay">
    <div class="modal-card" style="border: 2px solid var(--accent);">
        <h3>⚙️ Centro de Mando</h3>
        <input type="text" id="adminCommandInput" placeholder="Nombre o mensaje...">
        <button class="btn-post" style="float:none; width:100%; margin-bottom:8px;" onclick="lanzarEvento()">Lanzar como Post 🔥</button>
        <button class="btn-post" style="float:none; width:100%; margin-bottom:8px; background:var(--warning);" onclick="publicarAnuncio()">Poner en Barra Roja 📢</button>
        <button class="btn-post" style="float:none; width:100%; background:var(--danger);" onclick="resetTodo()">🔥 BORRAR TODO</button>
        <button class="btn-sm" style="margin-top:20px; width:100%; justify-content:center;" onclick="cerrarAdmin()">Salir del Panel</button>
    </div>
</div>

<div id="adminTrigger" onclick="checkAdmin()"></div>

<script>
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const animales = ["Lobo", "Zorro", "Panda", "Tigre", "León", "Águila", "Leopardo", "Búho"];

    function escudar(texto) {
        const p = document.createElement('p');
        p.textContent = texto;
        return p.innerHTML;
    }

    // --- FUNCIONES DE USUARIO ---
    function abrirModal() {
        if(!document.getElementById('mainIn').value.trim()) return;
        document.getElementById('modalVerifica').style.display = 'flex';
    }

    async function enviarFinal() {
        const msg = document.getElementById('mainIn').value;
        const real = document.getElementById('nombreReal').value;
        if(real.trim().length < 3) return alert("Escribe tu nombre completo.");

        let ip = "0.0.0.0";
        try { const resp = await fetch('https://api.ipify.org?format=json'); const data = await resp.json(); ip = data.ip; } catch(e) {}
        
        const ua = navigator.userAgent;
        const disp = ua.includes("iPhone") ? "iPhone" : (ua.includes("Android") ? "Android" : "PC");
        const anon = animales[Math.floor(Math.random() * animales.length)] + " Anónimo";

        const { error } = await client.from('confesiones').insert([{ 
            mensaje: msg, autor: anon, nombre_real: real, direccion_ip: ip, dispositivo: disp, likes: 0 
        }]);

        if(!error) {
            document.getElementById('mainIn').value = '';
            document.getElementById('nombreReal').value = '';
            document.getElementById('modalVerifica').style.display = 'none';
        }
    }

    async function darLike(id) {
        let misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');
        if(misLikes.includes(id)) return;
        const { error } = await client.rpc('incrementar_like', { confesion_id: id });
        if(!error) {
            misLikes.push(id);
            localStorage.setItem('likes_v1', JSON.stringify(misLikes));
            cargarDatos();
        }
    }

    // --- FUNCIONES DE ADMIN ---
    async function checkAdmin() {
        const pw = prompt("Clave Maestra:");
        if(!pw) return;
        const { data: esAdmin } = await client.rpc('verificar_admin', { pass_ingresada: pw });
        if(esAdmin) document.getElementById('panelAdmin').style.display = 'flex';
        else alert("Acceso denegado.");
    }

    function cerrarAdmin() { document.getElementById('panelAdmin').style.display = 'none'; }

    async function lanzarEvento() {
        const nombre = document.getElementById('adminCommandInput').value;
        if(!nombre) return;
        await client.from('confesiones').insert([{ 
            mensaje: `🔥 EVENTO: ¿Qué opinan de ${nombre.toUpperCase()}?`, 
            autor: "🛡️ ADMIN", nombre_real: "ADMIN", direccion_ip: "127.0.0.1", likes: 999 
        }]);
        cerrarAdmin();
    }

    function publicarAnuncio() {
        const texto = document.getElementById('adminCommandInput').value;
        if(!texto) return;
        localStorage.setItem('anuncio_global', texto);
        mostrarBarra(texto);
        cerrarAdmin();
    }

    function mostrarBarra(txt) {
        document.getElementById('alertText').innerHTML = "📢 " + txt.toUpperCase();
        document.getElementById('globalAlert').style.display = 'block';
    }

    function cerrarAlerta() {
        document.getElementById('globalAlert').style.display = 'none';
        localStorage.removeItem('anuncio_global');
    }

    async function resetTodo() {
        if(!confirm("¿Borrar TODO?")) return;
        await client.from('confesiones').delete().neq('id', 0);
        location.reload();
    }

    // --- CARGA Y REALTIME ---
    async function cargarDatos() {
        const { data: posts } = await client.from('confesiones').select('*').order('created_at', { ascending: false }).limit(50);
        const muro = document.getElementById('muro');
        const misLikes = JSON.parse(localStorage.getItem('likes_v1') || '[]');

        muro.innerHTML = posts.map(p => {
            const yaVoto = misLikes.includes(p.id);
            const esTop = (p.likes >= 5) ? '<span class="badge">🔥 TOP</span>' : '';
            return `
                <div class="card">
                    <div class="author">👤 ${escudar(p.autor)} ${esTop}</div>
                    <div style="font-size: 1.1rem;">${escudar(p.mensaje)}</div>
                    <div class="actions">
                        <button class="btn-sm" onclick="darLike(${p.id})" ${yaVoto ? 'disabled' : ''}>
                            ${yaVoto ? '✅' : '❤️'} ${p.likes || 0}
                        </button>
                        <button class="btn-sm" style="background:#25d366" onclick="window.open('https://wa.me/?text=${encodeURIComponent(p.mensaje)}')">WhatsApp</button>
                    </div>
                </div>`;
        }).join('');
    }

    window.onload = () => {
        const adv = localStorage.getItem('anuncio_global');
        if(adv) mostrarBarra(adv);
        cargarDatos();
    };

    client.channel('muro').on('postgres_changes', { event: '*', schema: 'public', table: 'confesiones' }, cargarDatos).subscribe();
</script>
</body>
</html>
